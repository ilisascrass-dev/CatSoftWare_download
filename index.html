            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            gap: 10px;

            color: #764ba2;
            min-width: 120px;
        }

        .filename {
            background: #2d2d2d;
            color: #00ff9d;
            padding: 12px 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            word-break: break-all;
            margin: 20px 0;
            text-align: center;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);

        .download-btn:hover {

<body>
    <div class="card">
        <div class="cat-icon">CatCheat</div>
        <h1>
            <span>Download HidSounds pak</span>
            <span style="background: linear-gradient(135deg, #667eea, #764ba2); background-clip: text; -webkit-background-clip: text; color: transparent;">CatCheat</span>
        </h1>
        <div class="subtitle">Professional Cheat Tool</div>

        <div class="info-box">
            <div class="info-item">
                <strong>📦 Название архива:</strong>
                <span style="font-family: monospace;">HidSounds block post Cheat.zip</span>
            </div>
            <div class="info-item">
                <strong>📅 Создано:</strong>
                <span>30.04.2026</span>
            </div>
            <div class="info-item">
                <strong>⚡ Платформа:</strong>
                <span>android</span>
            </div>
        </div>

        <div class="filename">
            📁 HidSounds block post Cheat.zip (2.8 MB)
        </div>

        <button class="download-btn" id="downloadBtn">
            ⬇️ Скачать файл ⬇️
        </button>

        <footer>
            Используйте HidSounds sounds паки.
        </footer>
    </div>

    <script>
        (function() {
            // Создаем ZIP-архив в памяти браузера (имитация файла)
            const fileName = "HidSounds block post Cheat.zip";
            
            // Содержимое архива - текстовый файл с инструкцией и демо-данными
            // В реальном проекте здесь будет ссылка на реальный файл на сервере
            const fileContent = `CatCheat Software - Installation Guide
=====================================

📌 Software: CatCheat
📦 Archive: HidSounds block post Cheat.zip

Инструкция по установке:
1. Распакуйте архив в любую папку.
2. кидать в /storage/emulated/0/Android/data/com.skullcapstudios.bpm. (Папку не надо переносить!)

Дата создания: 30.04.2026

`;

            // Функция для скачивания файла
            function downloadZip() {
                try {
                    // Создаем Blob с содержимым
                    const blob = new Blob([fileContent], { type: "application/zip" });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.href = url;
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                    
                    // Анимация обратной связи
                    const btn = document.getElementById('downloadBtn');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '✅ Скачивание началось! ✅';
                    btn.style.background = 'linear-gradient(135deg, #00b09b, #96c93d)';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                    }, 2000);
                } catch (error) {
                    console.error('Ошибка при скачивании:', error);
                    alert('Произошла ошибка при создании файла. Пожалуйста, попробуйте снова.');
                }
            }

            // Назначаем обработчик на кнопку
            const downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', downloadZip);
            }
        })();
    </script>
